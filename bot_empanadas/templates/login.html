<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Que Chimba | Login</title>
  <style>
    :root {
      --bg: #f4efe6;
      --card: #fffdf8;
      --ink: #1f1f1f;
      --brand: #12703a;
      --accent: #d98c1d;
      --danger: #b3261e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #ffe8c7, transparent 40%),
                  radial-gradient(circle at bottom right, #d9f3df, transparent 45%),
                  var(--bg);
      padding: 16px;
    }

    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid #eadfce;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.55rem;
    }

    p {
      margin: 0 0 20px;
      color: #545454;
      font-size: 0.95rem;
    }

    .hint {
      margin: 0 0 14px;
      padding: 10px 12px;
      background: #fff4df;
      border: 1px solid #f0dbb4;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #5a4829;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      border: 1px solid #d2d2d2;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      background: #fff;
    }

    input:focus {
      outline: 2px solid rgba(18, 112, 58, 0.25);
      border-color: var(--brand);
    }

    button {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      background: linear-gradient(135deg, var(--brand), #0d5b2f);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.05); }

    .error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.9rem;
      min-height: 1.2rem;
    }

    .back {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
    }

    .back a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 6% 5%, #ffe4b7 0%, transparent 36%),
        radial-gradient(circle at 95% 0%, #d8f2e2 0%, transparent 32%),
        linear-gradient(180deg, #f6f0e3 0%, #f1e9d8 100%);
    }

    .card {
      border-radius: 20px;
      border: 1px solid #e8dbc3;
      box-shadow: 0 16px 34px rgba(35, 24, 12, 0.12);
      animation: popIn 0.32s ease;
    }

    .hint {
      border-radius: 12px;
      background: #fff6e3;
    }

    input,
    button {
      border-radius: 12px;
      font-family: inherit;
    }

    button {
      letter-spacing: 0.3px;
      box-shadow: 0 8px 16px rgba(13, 91, 47, 0.22);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      letter-spacing: -0.02em;
      font-size: clamp(1.45rem, 3.2vw, 1.9rem);
    }

    p,
    .hint,
    .error,
    .back {
      line-height: 1.5;
    }

    input {
      border-color: #d8ccb3;
      background: #fffdf9;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ingresar al panel</h1>
    <p>Acceso con credenciales guardadas en PostgreSQL (hash seguro).</p>

    <div class="hint">
      Primera ejecucion: admin/admin123, cocina/cocina123, repartidor/repartidor123.
      Luego puedes administrarlos desde el panel de seguridad.
    </div>

    <form id="login-form">
      <label for="username">Usuario</label>
      <input id="username" name="username" autocomplete="username" required />

      <label for="password">Contrasena</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Entrar</button>
      <div id="error" class="error"></div>
    </form>

    <div class="back"><a href="/">Volver al inicio</a></div>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");

    const roleTarget = {
      admin: "/admin",
      cocina: "/cocina",
      repartidor: "/repartidor",
    };

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      errorEl.textContent = "";

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Credenciales invalidas");
        }

        const target = roleTarget[data.data.rol] || "/admin";
        window.location.href = target;
      } catch (err) {
        errorEl.textContent = err.message || "No se pudo iniciar sesion";
      }
    });
  </script>
</body>
</html>
