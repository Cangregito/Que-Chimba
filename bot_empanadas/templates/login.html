<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Malparida Empanada | Login</title>
  <style>
    :root {
      --bg: #f4efe6;
      --card: #fffdf8;
      --ink: #1f1f1f;
      --brand: #12703a;
      --accent: #d98c1d;
      --danger: #b3261e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 6% 5%, #ffe4b7 0%, transparent 36%),
        radial-gradient(circle at 95% 0%, #d8f2e2 0%, transparent 32%),
        linear-gradient(180deg, #f6f0e3 0%, #f1e9d8 100%);
      padding: 16px;
    }

    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid #e8dbc3;
      border-radius: 20px;
      padding: 28px 24px 24px;
      box-shadow: 0 16px 34px rgba(35, 24, 12, 0.12);
      animation: popIn 0.32s ease;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.45rem, 3.2vw, 1.9rem);
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 0 20px;
      color: #545454;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      border: 1px solid #d8ccb3;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 1rem;
      font-family: inherit;
      background: #fffdf9;
      color: var(--ink);
    }

    input:focus {
      outline: 2px solid rgba(18, 112, 58, 0.25);
      border-color: var(--brand);
    }

    button[type="submit"] {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 11px 12px;
      background: linear-gradient(135deg, var(--brand), #0d5b2f);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(13, 91, 47, 0.22);
      transition: filter 0.15s;
    }

    button[type="submit"]:hover { filter: brightness(1.06); }

    .error {
      margin-top: 12px;
      color: var(--danger);
      font-size: 0.9rem;
      min-height: 1.2rem;
      line-height: 1.5;
    }

    .support-link {
      margin-top: 18px;
      text-align: center;
      font-size: 0.88rem;
      color: #7a6a4f;
    }

    .support-link a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
    }

    .support-link a:hover { text-decoration: underline; }

    .back {
      margin-top: 10px;
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .back a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="card">
    <h1>Ingresar al panel</h1>
    <p>Bienvenido, por favor ingresa tus credenciales.</p>

    <form id="login-form">
      <label for="username">Usuario</label>
      <input id="username" name="username" autocomplete="username" required />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Entrar</button>
      <div id="error" class="error"></div>
    </form>

    <div class="support-link">
      Necesitas ayuda? <a href="/soporte">Ir a soporte técnico</a>
    </div>

    <div class="back"><a href="/">Volver al inicio</a></div>
  </main>

  <script>
    const form    = document.getElementById("login-form");
    const errorEl = document.getElementById("error");
    const roleTarget = { admin: "/admin", cocina: "/cocina", repartidor: "/repartidor" };

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      errorEl.textContent = "";
      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value,
      };
      try {
        const res  = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "Credenciales invalidas");
        window.location.href = roleTarget[data.data.rol] || "/admin";
      } catch (err) {
        errorEl.textContent = err.message || "No se pudo iniciar sesion";
      }
    });
  </script>
</body>
</html>
