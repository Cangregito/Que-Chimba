<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Que Chimba | Cocina</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Segoe UI", "sans-serif"]
          }
        }
      }
    };
  </script>
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="/static/ui/soft-ui-components.js"></script>
  <link rel="stylesheet" href="/static/ui/soft-ui-theme.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --line: #F1F5F9;
      --text: #111827;
      --text-2: #6B7280;
      --text-3: #9CA3AF;
      --accent: #4F46E5;
      --accent-bg: #EEF2FF;
      --blue-bg: #EEF2FF;
      --blue-fg: #4338CA;
      --green-bg: #ECFDF3;
      --green-fg: #047857;
      --amber-bg: #FFFBEB;
      --amber-fg: #B45309;
      --red-bg: #FFF1F2;
      --red-fg: #BE123C;
      --r-sm: 12px;
      --r-lg: 20px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 12px 24px rgba(15, 23, 42, 0.08);
      --t: 300ms ease;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      font-weight: 400;
      background-image: radial-gradient(circle at 5% 0%, rgba(79, 70, 229, 0.08), transparent 35%), radial-gradient(circle at 92% 22%, rgba(16, 185, 129, 0.08), transparent 30%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px;
      display: grid;
      gap: 20px;
      grid-template-columns: 2fr 1fr;
    }

    .top {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
      animation: ui-rise 420ms ease both;
    }

    .top h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--text-2);
      font-size: 13px;
      margin-top: 4px;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--t);
      animation: ui-rise 520ms ease both;
    }

    .kpi:nth-child(2) { animation-delay: 50ms; }
    .kpi:nth-child(3) { animation-delay: 90ms; }
    .kpi:nth-child(4) { animation-delay: 130ms; }

    .kpi:hover {
      box-shadow: var(--shadow-md);
    }

    .kpi p {
      margin: 0;
      color: var(--text-2);
      font-size: 13px;
    }

    .kpi h2 {
      margin: 6px 0 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      animation: ui-rise 480ms ease both;
    }

    .panel:nth-of-type(2) { animation-delay: 60ms; }
    .panel:nth-of-type(3) { animation-delay: 120ms; }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .head h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--text-2);
      padding: 10px 14px;
      min-height: 38px;
      cursor: pointer;
      transition: background var(--t), color var(--t), border-color var(--t), box-shadow var(--t);
    }

    .btn:hover {
      background: #F9FAFB;
      color: var(--text);
    }

    .btn.primary {
      background: var(--accent-bg);
      border-color: #E0E7FF;
      color: var(--accent);
      font-weight: 600;
    }

    .btn:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(79, 70, 229, 0.25);
      outline-offset: 1px;
    }

    .chip {
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
    }

    .chip.blue { background: #EEF2FF; color: #4338CA; border-color: #E0E7FF; }
    .chip.green { background: #ECFDF3; color: #047857; border-color: #D1FAE5; }
    .chip.amber { background: #FFFBEB; color: #B45309; border-color: #FDE68A; }
    .chip.red { background: #FFF1F2; color: #BE123C; border-color: #FFE4E6; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(210px, 1fr));
      gap: 12px;
    }

    .col {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: #F8FAFC;
      min-height: 360px;
      padding: 12px;
      transition: background var(--t), box-shadow var(--t);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .col.drag-over {
      background: #EEF2FF;
      box-shadow: var(--shadow-md);
    }

    .col-title {
      margin: 0 0 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: #F8FAFC;
      padding-bottom: 6px;
      z-index: 2;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 360px);
      overflow: auto;
      padding-right: 2px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: var(--surface);
      padding: 14px;
      cursor: grab;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--t), transform var(--t), border-color var(--t);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card.warn { border-color: #FDE68A; }
    .card.urgent { border-color: #FFE4E6; background: #FFF1F2; }
    .card:active { cursor: grabbing; }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .card-head h4 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .meta strong { color: var(--text); font-weight: 500; }

    .products {
      margin: 0;
      padding-left: 18px;
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .empty {
      border: 1px dashed #E2E8F0;
      border-radius: var(--r-lg);
      color: var(--text-3);
      font-size: 13px;
      text-align: center;
      padding: 14px;
      background: #FFFFFF;
    }

    .zones {
      display: grid;
      gap: 8px;
      max-height: 600px;
      overflow: auto;
    }

    .zone {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 12px;
      box-shadow: var(--shadow-sm);
    }

    .zone h4 {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .zone ul {
      margin: 0;
      padding-left: 16px;
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.45;
    }

    .error {
      margin-top: 8px;
      color: #BE123C;
      background: #FFF1F2;
      border: 1px solid #FFE4E6;
      border-radius: var(--r-sm);
      padding: 10px;
      font-size: 13px;
      display: none;
    }

    .error.show { display: block; }

    .skeleton {
      display: grid;
      gap: 6px;
    }

    .s-line {
      height: 9px;
      border-radius: 999px;
      background: #E2E8F0;
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.55; }
      100% { opacity: 1; }
    }

    @keyframes ui-rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1150px) {
      .main {
        grid-template-columns: 1fr;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .kpis {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    @media (max-width: 700px) {
      .kpis {
        grid-template-columns: 1fr;
      }

      .meta {
        grid-template-columns: 1fr;
      }
    }

    .main {
      max-width: 1320px;
      padding: clamp(16px, 2.2vw, 30px);
      gap: 24px;
      grid-template-columns: minmax(0, 1.65fr) minmax(300px, 1fr);
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 14px;
      padding: 18px;
    }

    #react-ui-cocina-top-actions {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
    }

    #react-ui-cocina-kpis {
      grid-row: 2;
      grid-column: 1 / -1;
    }

    .card {
      padding: 12px;
    }

    .card-head {
      margin-bottom: 10px;
    }

    .meta {
      gap: 4px 10px;
    }

  </style>
</head>
<body class="soft-page">
  <main class="main">
    <div id="react-ui-cocina-strip"></div>
    <header class="top">
      <div>
        <h1>Panel de Cocina</h1>
        <div class="sub" id="lastUpdate">Ultima actualizacion: -</div>
      </div>
      <div id="react-ui-cocina-top-actions"></div>
      <div id="react-ui-cocina-kpis"></div>
    </header>

    <section class="panel">
      <div class="head">
        <div id="react-ui-cocina-flow-heading"></div>
        <div id="react-ui-cocina-actions"></div>
      </div>

      <div class="board" id="kanbanBoard">
        <section class="col" data-drop-state="recibido">
          <p class="col-title">Recibido <span id="count-recibido" class="chip blue">0</span></p>
          <div id="orders-recibido" class="list"></div>
        </section>

        <section class="col" data-drop-state="en_preparacion">
          <p class="col-title">En preparacion <span id="count-prep" class="chip amber">0</span></p>
          <div id="orders-prep" class="list"></div>
        </section>

        <section class="col" data-drop-state="listo">
          <p class="col-title">Listo <span id="count-listo" class="chip green">0</span></p>
          <div id="orders-listo" class="list"></div>
        </section>
      </div>

      <div class="error" id="errorText"></div>
    </section>

    <aside class="panel">
      <div class="head">
        <div id="react-ui-cocina-zones-heading"></div>
      </div>
      <div id="zoneContainer" class="zones"></div>
    </aside>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      function ensureCocinaFallbackNodes() {
        const topActions = document.getElementById("react-ui-cocina-top-actions");
        if (topActions && !document.getElementById("btn-logout")) {
          topActions.innerHTML = "<button class='btn' id='btn-logout' type='button'>Salir</button>";
        }

        const flowActions = document.getElementById("react-ui-cocina-actions");
        if (flowActions && !document.getElementById("btn-refresh")) {
          flowActions.innerHTML = "<button class='btn' id='btn-refresh' type='button'>Actualizar</button>";
        }

        const kpis = document.getElementById("react-ui-cocina-kpis");
        if (kpis && !document.getElementById("kpi-total")) {
          kpis.innerHTML =
            "<div class='kpis'>" +
              "<article class='kpi'><p>Total en cola</p><h2 id='kpi-total'>0</h2></article>" +
              "<article class='kpi'><p>Recibidos</p><h2 id='kpi-recibidos'>0</h2></article>" +
              "<article class='kpi'><p>En preparacion</p><h2 id='kpi-prep'>0</h2></article>" +
              "<article class='kpi'><p>Listos</p><h2 id='kpi-listos'>0</h2></article>" +
            "</div>";
        }
      }

      if (window.QCSoftUI && typeof window.QCSoftUI.mountSoftHeaderStrip === "function") {
        window.QCSoftUI.mountSoftHeaderStrip("react-ui-cocina-strip", {
          items: [
            { tone: "indigo", text: "Cocina" },
            { tone: "emerald", text: "Kanban operativo" },
            { tone: "amber", text: "UI React + Tailwind" }
          ]
        });

        if (typeof window.QCSoftUI.mountSoftPanelHeading === "function") {
          window.QCSoftUI.mountSoftPanelHeading("react-ui-cocina-flow-heading", {
            title: "Flujo de pedidos",
            subtitle: "Recibido, preparacion y listo",
            icon: "chef-hat",
            tone: "indigo"
          });
          window.QCSoftUI.mountSoftPanelHeading("react-ui-cocina-zones-heading", {
            title: "Agrupado por CP",
            subtitle: "Ayuda para salida de reparto",
            icon: "map-pinned",
            tone: "emerald"
          });
        }

        if (typeof window.QCSoftUI.mountSoftKpiRow === "function") {
          window.QCSoftUI.mountSoftKpiRow("react-ui-cocina-kpis", {
            items: [
              { label: "Total en cola", valueId: "kpi-total", initialValue: "0" },
              { label: "Recibidos", valueId: "kpi-recibidos", initialValue: "0" },
              { label: "En preparacion", valueId: "kpi-prep", initialValue: "0" },
              { label: "Listos", valueId: "kpi-listos", initialValue: "0" }
            ]
          });
        }

        if (typeof window.QCSoftUI.mountSoftActionButtons === "function") {
          window.QCSoftUI.mountSoftActionButtons("react-ui-cocina-actions", {
            items: [
              { id: "btn-refresh", text: "Actualizar", tone: "ghost" }
            ]
          });

          window.QCSoftUI.mountSoftActionButtons("react-ui-cocina-top-actions", {
            items: [
              { id: "btn-logout", text: "Salir", tone: "ghost" }
            ]
          });
        }
      }

      ensureCocinaFallbackNodes();

      if (typeof initCocinaPanel === "function") {
        setTimeout(initCocinaPanel, 0);
      }
    });

    function initCocinaPanel() {
      const API_QUEUE_URL = "/api/pedidos?estado=recibido,en_preparacion,listo";
      const API_STATUS_BASE = "/api/pedidos";
      const REFRESH_MS = 15000;

      const nodes = {
        board: document.getElementById("kanbanBoard"),
        recibido: document.getElementById("orders-recibido"),
        prep: document.getElementById("orders-prep"),
        listo: document.getElementById("orders-listo"),
        cRec: document.getElementById("count-recibido"),
        cPrep: document.getElementById("count-prep"),
        cListo: document.getElementById("count-listo"),
        kTotal: document.getElementById("kpi-total"),
        kRec: document.getElementById("kpi-recibidos"),
        kPrep: document.getElementById("kpi-prep"),
        kListo: document.getElementById("kpi-listos"),
        zone: document.getElementById("zoneContainer"),
        last: document.getElementById("lastUpdate"),
        err: document.getElementById("errorText"),
        refresh: document.getElementById("btn-refresh"),
        logout: document.getElementById("btn-logout")
      };

      let currentOrders = [];
      let refreshTimer = null;
      let isFetching = false;

      const UI_BTN_GHOST = "btn rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors duration-200";
      const UI_BTN_PRIMARY = "btn primary rounded-xl bg-indigo-50 text-indigo-600 font-medium hover:bg-indigo-100 transition-colors duration-200";
      const UI_CHIP = {
        blue: "chip blue rounded-full bg-indigo-50 text-indigo-700 border border-indigo-100",
        amber: "chip amber rounded-full bg-amber-50 text-amber-700 border border-amber-100",
        green: "chip green rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100",
        red: "chip red rounded-full bg-rose-50 text-rose-700 border border-rose-100"
      };

      function esc(value) {
        return String(value == null ? "" : value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function jsEsc(value) {
        return String(value == null ? "" : value)
          .replaceAll("\\", "\\\\")
          .replaceAll("'", "\\'")
          .replaceAll("\n", " ");
      }

      function emptyState(text) {
        return "<div class='empty rounded-2xl border border-dashed border-gray-200 bg-white/90 text-gray-500'>" + esc(text) + "</div>";
      }

      function showError(message) {
        nodes.err.textContent = message;
        nodes.err.classList.add("show");
      }

      function clearError() {
        nodes.err.classList.remove("show");
        nodes.err.textContent = "";
      }

      function getField(obj, keys, fallback = "-") {
        for (const key of keys) {
          const value = obj && obj[key];
          if (value !== undefined && value !== null && value !== "") return value;
        }
        return fallback;
      }

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function formatHour(value) {
        const dt = new Date(value || "");
        if (Number.isNaN(dt.getTime())) return "-";
        return dt.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
      }

      function minutesSince(value) {
        const dt = new Date(value || "");
        if (Number.isNaN(dt.getTime())) return null;
        return Math.max(0, Math.floor((Date.now() - dt.getTime()) / 60000));
      }

      function priority(minutes) {
        if (minutes == null) return "normal";
        if (minutes >= 25) return "urgent";
        if (minutes >= 15) return "warn";
        return "normal";
      }

      function stateLabel(value) {
        if (value === "en_preparacion") return "En preparacion";
        if (value === "recibido") return "Recibido";
        if (value === "listo") return "Listo";
        return value || "-";
      }

      function stateChip(state) {
        if (state === "recibido") return "<span class='" + UI_CHIP.blue + "'>Recibido</span>";
        if (state === "en_preparacion") return "<span class='" + UI_CHIP.amber + "'>En preparacion</span>";
        if (state === "listo") return "<span class='" + UI_CHIP.green + "'>Listo</span>";
        return "<span class='" + UI_CHIP.red + "'>" + esc(state) + "</span>";
      }

      function normalizeOrder(raw) {
        const id = getField(raw, ["pedido_id", "id", "numero"], "");
        const number = getField(raw, ["numero_pedido", "numero", "pedido_id", "id"], id || "-");
        const customer = [raw && raw.nombre, raw && raw.apellidos].filter(Boolean).join(" ").trim() || getField(raw, ["cliente_nombre", "cliente"], "Cliente sin nombre");
        const state = String(getField(raw, ["estado"], "recibido")).toLowerCase();
        const receivedAt = getField(raw, ["creado_en", "recibido_en", "hora_recepcion"], "-");
        const address = getField(raw, ["direccion_entrega", "direccion"], "Direccion no disponible");
        const postalCode = String(getField(raw, ["codigo_postal", "cp"], "00000"));
        const items = asArray(getField(raw, ["items", "productos", "detalle"], []));
        const totalQty = Number(getField(raw, ["cantidad_total", "total_cantidad"], NaN));
        return {
          id,
          number,
          customer,
          state,
          receivedAt,
          address,
          postalCode,
          items,
          totalQty: Number.isNaN(totalQty) ? items.reduce((a, it) => a + Number(getField(it, ["cantidad"], 0)), 0) : totalQty
        };
      }

      function renderProducts(items) {
        if (!items.length) return "<li>Sin detalle de productos</li>";
        return items.map((it) => {
          if (typeof it === "string") return "<li>" + esc(it) + "</li>";
          const name = getField(it, ["producto", "nombre", "tipo"], "Producto");
          const qty = getField(it, ["cantidad", "qty"], "-");
          return "<li>" + esc(name) + " x " + esc(qty) + "</li>";
        }).join("");
      }

      function buildCard(order) {
        const mins = minutesSince(order.receivedAt);
        const p = priority(mins);
        const ageText = mins == null ? "Sin hora" : (mins + " min");
        const actions = [];
        if (order.state === "recibido") {
          actions.push("<button class='" + UI_BTN_GHOST + "' data-action='prep' data-id='" + esc(order.id) + "'>En preparacion</button>");
        }
        if (order.state === "recibido" || order.state === "en_preparacion") {
          actions.push("<button class='" + UI_BTN_PRIMARY + "' data-action='ready' data-id='" + esc(order.id) + "'>Listo para entregar</button>");
        }
        actions.push("<button class='" + UI_BTN_GHOST + "' data-action='print' data-id='" + esc(order.id) + "'>Imprimir QR</button>");

        return (
          "<article class='card " + p + " bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300' draggable='true' data-draggable-id='" + esc(order.id) + "'>" +
            "<div class='card-head'>" +
              "<h4>Pedido #" + esc(order.number) + "</h4>" +
              "<div style='display:flex; gap:6px; align-items:center; flex-wrap:wrap;'>" +
                (p === "urgent" ? "<span class='" + UI_CHIP.red + "'>" + esc(ageText) + "</span>" : (p === "warn" ? "<span class='" + UI_CHIP.amber + "'>" + esc(ageText) + "</span>" : "<span class='" + UI_CHIP.blue + "'>" + esc(ageText) + "</span>")) +
                stateChip(order.state) +
              "</div>" +
            "</div>" +
            "<div class='meta'>" +
              "<div><span>Cliente:</span> <strong>" + esc(order.customer) + "</strong></div>" +
              "<div><span>Hora:</span> <strong>" + esc(formatHour(order.receivedAt)) + "</strong></div>" +
              "<div><span>Cantidad:</span> <strong>" + esc(order.totalQty) + "</strong></div>" +
              "<div><span>CP:</span> <strong>" + esc(order.postalCode) + "</strong></div>" +
            "</div>" +
            "<ul class='products'>" + renderProducts(order.items) + "</ul>" +
            "<div class='actions'>" + actions.join("") + "</div>" +
          "</article>"
        );
      }

      function renderOrders() {
        const weight = { urgent: 3, warn: 2, normal: 1 };
        const sorter = (a, b) => {
          const pa = priority(minutesSince(a.receivedAt));
          const pb = priority(minutesSince(b.receivedAt));
          if (weight[pb] !== weight[pa]) return weight[pb] - weight[pa];
          const ta = new Date(a.receivedAt).getTime() || 0;
          const tb = new Date(b.receivedAt).getTime() || 0;
          return ta - tb;
        };

        const rec = currentOrders.filter((o) => o.state === "recibido").sort(sorter);
        const prep = currentOrders.filter((o) => o.state === "en_preparacion").sort(sorter);
        const listo = currentOrders.filter((o) => o.state === "listo").sort(sorter);

        nodes.cRec.textContent = String(rec.length);
        nodes.cPrep.textContent = String(prep.length);
        nodes.cListo.textContent = String(listo.length);

        nodes.kTotal.textContent = String(currentOrders.length);
        nodes.kRec.textContent = String(rec.length);
        nodes.kPrep.textContent = String(prep.length);
        nodes.kListo.textContent = String(listo.length);

        nodes.recibido.innerHTML = rec.length ? rec.map(buildCard).join("") : emptyState("No hay pedidos recibidos.");
        nodes.prep.innerHTML = prep.length ? prep.map(buildCard).join("") : emptyState("No hay pedidos en preparacion.");
        nodes.listo.innerHTML = listo.length ? listo.map(buildCard).join("") : emptyState("No hay pedidos listos.");

        setDragAndDrop();
      }

      function renderZones() {
        if (!currentOrders.length) {
          nodes.zone.innerHTML = emptyState("Sin pedidos para agrupar.");
          return;
        }

        const map = new Map();
        [...currentOrders].sort((a, b) => String(a.postalCode).localeCompare(String(b.postalCode))).forEach((order) => {
          const key = order.postalCode || "00000";
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(order);
        });

        const html = [];
        for (const [cp, orders] of map.entries()) {
          html.push(
            "<section class='zone'>" +
              "<h4>CP " + esc(cp) + "</h4>" +
              "<ul>" +
                orders.map((o) => "<li>#" + esc(o.number) + " - " + esc(o.customer) + " (" + esc(stateLabel(o.state)) + ")</li>").join("") +
              "</ul>" +
            "</section>"
          );
        }
        nodes.zone.innerHTML = html.join("");
      }

      function setDragAndDrop() {
        document.querySelectorAll(".card[draggable='true']").forEach((card) => {
          card.addEventListener("dragstart", (event) => {
            const id = card.getAttribute("data-draggable-id");
            if (!id || !event.dataTransfer) return;
            event.dataTransfer.setData("text/plain", id);
            event.dataTransfer.effectAllowed = "move";
          });
        });

        document.querySelectorAll(".col[data-drop-state]").forEach((col) => {
          col.addEventListener("dragover", (event) => {
            event.preventDefault();
            col.classList.add("drag-over");
          });
          col.addEventListener("dragleave", () => {
            col.classList.remove("drag-over");
          });
          col.addEventListener("drop", async (event) => {
            event.preventDefault();
            col.classList.remove("drag-over");
            const state = col.getAttribute("data-drop-state");
            const id = event.dataTransfer ? event.dataTransfer.getData("text/plain") : "";
            if (!state || !id) return;
            const order = currentOrders.find((o) => String(o.id) === String(id));
            if (!order || order.state === state) return;
            await updateOrderStatus(id, state);
          });
        });
      }

      async function fetchOrders(force) {
        if (isFetching && !force) return;
        isFetching = true;
        try {
          const res = await fetch(API_QUEUE_URL, {
            method: "GET",
            credentials: "same-origin",
            headers: { "Accept": "application/json" }
          });

          if (res.redirected && res.url) {
            window.location.href = res.url;
            return;
          }

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          if (!ct.includes("application/json")) {
            if (ct.includes("text/html")) window.location.href = "/login";
            throw new Error("Respuesta no valida");
          }

          const payload = await res.json().catch(() => ({}));
          const raw = Array.isArray(payload)
            ? payload
            : (Array.isArray(payload.data) ? payload.data : (Array.isArray(payload.pedidos) ? payload.pedidos : []));

          currentOrders = raw.map(normalizeOrder);
          renderOrders();
          renderZones();
          clearError();
          nodes.last.textContent = "Ultima actualizacion: " + new Date().toLocaleTimeString("es-MX");
        } catch (err) {
          showError("No se pudo actualizar la cola: " + (err && err.message ? err.message : "error"));
        } finally {
          isFetching = false;
        }
      }

      async function updateOrderStatus(orderId, newState) {
        try {
          const res = await fetch(API_STATUS_BASE + "/" + orderId + "/estado", {
            method: "PATCH",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({ estado: newState })
          });

          if (res.redirected && res.url) {
            window.location.href = res.url;
            return;
          }
          if (!res.ok) {
            throw new Error("Error " + res.status + " al cambiar estado");
          }
          await fetchOrders(true);
        } catch (err) {
          showError("No se pudo actualizar el pedido #" + orderId + ": " + (err && err.message ? err.message : "error"));
        }
      }

      function scheduleRefresh() {
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(async () => {
          if (!document.hidden) {
            await fetchOrders(false);
          }
          scheduleRefresh();
        }, REFRESH_MS);
      }

      function printOrderLabel(orderId) {
        const order = currentOrders.find((o) => String(o.id) === String(orderId) || String(o.number) === String(orderId));
        if (!order) {
          showError("No se encontro el pedido #" + orderId + " para imprimir.");
          return;
        }

        const payload = {
          pedido_id: order.id,
          pedido: order.number,
          cliente: order.customer,
          cp: order.postalCode,
          direccion: order.address,
          estado: order.state
        };

        const w = window.open("", "_blank", "width=420,height=640");
        if (!w) {
          showError("El navegador bloqueo la ventana de impresion.");
          return;
        }

        w.document.write(
          "<!doctype html><html lang='es'><head><meta charset='UTF-8'><title>Etiqueta Pedido #" + esc(order.number) + "</title>" +
          "<script src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'><\/script>" +
          "<style>body{font-family:system-ui,-apple-system,sans-serif;margin:16px;color:#111}.sheet{border:1px solid #333;border-radius:8px;padding:12px}h1{font-size:18px;margin-bottom:8px}p{font-size:14px;margin:6px 0}.address{font-weight:500;font-size:15px}#qr{margin-top:10px;width:180px;height:180px}</style>" +
          "</head><body><div class='sheet'><h1>Que Chimba - Pedido #" + esc(order.number) + "</h1><p><strong>Cliente:</strong> " + esc(order.customer) + "</p><p><strong>Estado:</strong> " + esc(stateLabel(order.state)) + "</p><p class='address'><strong>Direccion:</strong> " + esc(order.address) + "</p><div id='qr'></div></div>" +
          "<script>new QRCode(document.getElementById('qr'),{text:" + JSON.stringify(JSON.stringify(payload)) + ",width:180,height:180,correctLevel:QRCode.CorrectLevel.H});setTimeout(function(){window.print();},400);<\/script></body></html>"
        );
        w.document.close();
      }

      nodes.board.addEventListener("click", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const action = target.getAttribute("data-action");
        const id = target.getAttribute("data-id");
        if (!action || !id) return;
        if (action === "prep") {
          await updateOrderStatus(id, "en_preparacion");
        } else if (action === "ready") {
          await updateOrderStatus(id, "listo");
        } else if (action === "print") {
          printOrderLabel(id);
        }
      });

      if (nodes.refresh) {
        nodes.refresh.addEventListener("click", () => {
          fetchOrders(true);
        });
      }

      if (!window.__qcCocinaLogoutBound) {
        document.addEventListener("click", async (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          const logoutBtn = target.closest("#btn-logout");
          if (!logoutBtn) return;
          if (logoutBtn.dataset.busy === "1") return;

          logoutBtn.dataset.busy = "1";
          logoutBtn.setAttribute("disabled", "disabled");
          logoutBtn.textContent = "Saliendo...";
          try {
            await fetch("/logout", {
              method: "POST",
              credentials: "same-origin",
              headers: { "Accept": "application/json" }
            });
          } catch (_e) {
          } finally {
            window.location.href = "/login";
          }
        });
        window.__qcCocinaLogoutBound = true;
      }

      fetchOrders(true).catch(() => {});
      scheduleRefresh();

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          fetchOrders(true).catch(() => {});
        }
      });

      window.addEventListener("beforeunload", () => {
        if (refreshTimer) clearTimeout(refreshTimer);
      });
    }
  </script>
</body>
</html>
