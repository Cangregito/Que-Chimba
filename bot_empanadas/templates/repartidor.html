<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Malparida Empanada | Repartidor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Segoe UI", "sans-serif"]
          }
        }
      }
    };
  </script>
  <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="/static/ui/soft-ui-components.js"></script>
  <link rel="stylesheet" href="/static/ui/soft-ui-theme.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

    :root {
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --line: #F1F5F9;
      --text: #111827;
      --text-2: #6B7280;
      --text-3: #9CA3AF;
      --accent: #4F46E5;
      --accent-bg: #EEF2FF;
      --blue-bg: #EEF2FF;
      --blue-fg: #4338CA;
      --green-bg: #ECFDF3;
      --green-fg: #047857;
      --amber-bg: #FFFBEB;
      --amber-fg: #B45309;
      --red-bg: #FFF1F2;
      --red-fg: #BE123C;
      --r-sm: 12px;
      --r-lg: 20px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow-md: 0 12px 24px rgba(15, 23, 42, 0.08);
      --t: 300ms ease;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      font-weight: 400;
      background-image: radial-gradient(circle at 10% 0%, rgba(79, 70, 229, 0.08), transparent 35%), radial-gradient(circle at 88% 18%, rgba(16, 185, 129, 0.08), transparent 28%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    .main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px;
      display: grid;
      grid-template-columns: 1.75fr 1fr;
      gap: 20px;
    }

    .top {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
      animation: ui-rise 420ms ease both;
    }

    .top h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--text-2);
      font-size: 13px;
      margin-top: 4px;
    }

    .chip {
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .chip.blue { background: #EEF2FF; color: #4338CA; border-color: #E0E7FF; }
    .chip.green { background: #ECFDF3; color: #047857; border-color: #D1FAE5; }
    .chip.amber { background: #FFFBEB; color: #B45309; border-color: #FDE68A; }
    .chip.red { background: #FFF1F2; color: #BE123C; border-color: #FFE4E6; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--t);
      animation: ui-rise 520ms ease both;
    }

    .kpi:nth-child(2) { animation-delay: 60ms; }
    .kpi:nth-child(3) { animation-delay: 110ms; }

    .kpi:hover {
      box-shadow: var(--shadow-md);
    }

    .kpi p {
      margin: 0;
      color: var(--text-2);
      font-size: 13px;
    }

    .kpi h2 {
      margin: 6px 0 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      animation: ui-rise 500ms ease both;
    }

    .panel:nth-of-type(2) { animation-delay: 70ms; }
    .panel:nth-of-type(3) { animation-delay: 130ms; }

    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .head h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: var(--r-sm);
      background: transparent;
      color: var(--text-2);
      padding: 10px 14px;
      min-height: 38px;
      cursor: pointer;
      transition: background var(--t), color var(--t), border-color var(--t), box-shadow var(--t);
    }

    .btn:hover {
      background: #F9FAFB;
      color: var(--text);
    }

    .btn.primary {
      background: var(--accent-bg);
      border-color: #E0E7FF;
      color: var(--accent);
      font-weight: 600;
    }

    .btn:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(79, 70, 229, 0.25);
      outline-offset: 1px;
    }

    .orders,
    .route {
      display: grid;
      gap: 12px;
    }

    aside.panel {
      position: sticky;
      top: 18px;
      align-self: start;
      max-height: calc(100vh - 36px);
      overflow: auto;
    }

    .order-card,
    .route-card {
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: var(--surface);
      padding: 14px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--t), transform var(--t);
    }

    .order-card:hover,
    .route-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .order-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .order-id {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .grid strong {
      color: var(--text);
      font-weight: 500;
    }

    .products {
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: #F8FAFC;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-2);
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 2px;
    }

    .confirm-box {
      display: none;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: #F8FAFC;
      padding: 10px;
    }

    .confirm-box.active { display: block; }

    .confirm-box label {
      display: block;
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .confirm-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 6px;
    }

    .confirm-row.two-inputs {
      grid-template-columns: 1fr 1fr auto auto;
    }

    .confirm-row input {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 999px;
      background: #F9FAFB;
      padding: 10px 14px;
      text-transform: uppercase;
      font-size: 13px;
      transition: background var(--t), border-color var(--t), box-shadow var(--t);
    }

    .confirm-row input:focus {
      outline: none;
      background: #FFFFFF;
      border-color: #A5B4FC;
      box-shadow: 0 0 0 3px rgba(224, 231, 255, 0.95);
    }

    .small-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-3);
    }

    .route-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .route-order {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid #E0E7FF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .route-main {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.4;
    }

    .route-main strong {
      color: var(--text);
      font-weight: 500;
    }

    .empty {
      border: 1px dashed #E2E8F0;
      border-radius: var(--r-lg);
      color: var(--text-3);
      font-size: 13px;
      text-align: center;
      padding: 14px;
      background: #FFFFFF;
    }

    .alert {
      display: none;
      border-radius: var(--r-sm);
      border: 1px solid transparent;
      padding: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .alert.show { display: block; }
    .alert.success { background: #ECFDF3; color: #047857; border-color: #D1FAE5; }
    .alert.error { background: #FFF1F2; color: #BE123C; border-color: #FFE4E6; }

    .qr-scanner {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      background: #F8FAFC;
      padding: 10px;
      display: none;
    }

    .qr-scanner.active {
      display: block;
    }

    .qr-scanner-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .qr-scanner-head strong {
      font-size: 14px;
      font-weight: 600;
    }

    .qr-reader {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      overflow: hidden;
      background: #000;
    }

    .qr-help {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-2);
      text-align: center;
    }

    @keyframes ui-rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1080px) {
      .main { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: 1fr 1fr; }
      .actions { grid-template-columns: 1fr; }
    }

    @media (max-width: 700px) {
      .kpis { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .confirm-row { grid-template-columns: 1fr; }
      .route-card { grid-template-columns: auto 1fr; }
      .route-card .btn { grid-column: 1 / -1; }
    }

    .main {
      max-width: 1320px;
      padding: clamp(16px, 2.2vw, 30px);
      gap: 24px;
      grid-template-columns: minmax(0, 1.6fr) minmax(300px, 1fr);
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 14px;
      padding: 18px;
    }

    .top .chip.blue {
      grid-column: 1;
      grid-row: 2;
      justify-self: start;
    }

    #react-ui-repartidor-top-actions {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
    }

    #react-ui-repartidor-kpis {
      grid-row: 3;
      grid-column: 1 / -1;
    }

    .actions {
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    }

    .order-card,
    .route-card {
      padding: 12px;
    }

    .products {
      margin-bottom: 10px;
      padding: 9px;
    }

    @media (max-width: 900px) {
      .main {
        padding: 12px;
        gap: 14px;
        grid-template-columns: 1fr;
      }

      .top {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .top .chip.blue {
        grid-column: 1;
        grid-row: auto;
      }

      #react-ui-repartidor-top-actions,
      #react-ui-repartidor-kpis {
        grid-column: 1;
        grid-row: auto;
        justify-self: stretch;
      }

      .panel {
        padding: 14px;
      }

      aside.panel {
        position: static;
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 640px) {
      .top h1 {
        font-size: 18px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .confirm-row.two-inputs {
        grid-template-columns: 1fr;
      }

      .order-card,
      .route-card {
        padding: 10px;
      }
    }

    @media (max-width: 480px) {
      html,
      body {
        overflow-x: hidden;
      }

      .main,
      .top,
      .panel,
      .kpis,
      .orders,
      .route,
      .order-card,
      .route-card,
      .grid,
      .actions,
      .confirm-box,
      .confirm-row,
      .confirm-row.two-inputs,
      .products,
      .qr-scanner {
        min-width: 0;
        max-width: 100%;
      }

      .main {
        padding: 10px;
      }

      .kpi h2 {
        font-size: 24px;
      }

      .actions,
      .confirm-row,
      .confirm-row.two-inputs {
        grid-template-columns: 1fr;
      }

      .actions .btn,
      .confirm-row .btn {
        width: 100%;
      }

      .route-card {
        grid-template-columns: 1fr;
      }

      .route-order {
        width: 22px;
        height: 22px;
      }

      .qr-reader {
        max-width: 100%;
      }
    }

  </style>
</head>
<body class="soft-page">
  <main class="main">
    <div id="react-ui-repartidor-strip"></div>
    <section class="top">
      <div>
        <h1>Panel de Repartidor</h1>
        <div class="sub">Validacion QR de entregas y ruta por CP.</div>
      </div>
      <div class="chip blue">Repartidor: {{ (user.username if user else 'demo') }}</div>
      <div id="react-ui-repartidor-top-actions"></div>
      <div id="react-ui-repartidor-kpis"></div>
    </section>

    <section class="panel">
      <div id="msg-success" class="alert success" role="status" aria-live="polite"></div>
      <div id="msg-error" class="alert error" role="alert" aria-live="assertive"></div>

      <div class="head">
        <div id="react-ui-repartidor-orders-heading"></div>
        <div id="react-ui-repartidor-actions"></div>
      </div>

      <div id="qr-scanner" class="qr-scanner" aria-live="polite">
        <div class="qr-scanner-head">
          <strong>Escaner QR de etiqueta de cocina</strong>
          <button class="btn" id="btn-stop-scan" type="button">Cerrar</button>
        </div>
        <div id="qr-reader" class="qr-reader"></div>
        <div class="qr-help">Apunta la camara al QR del cliente o de cocina para validar la entrega.</div>
      </div>

      <div class="orders" id="orders-container">
        <div id="react-ui-repartidor-orders-empty"></div>
      </div>
    </section>

    <aside class="panel">
      <div class="head">
        <div id="react-ui-repartidor-route-heading"></div>
      </div>
      <div class="route" id="route-container">
        <div id="react-ui-repartidor-route-empty"></div>
      </div>
    </aside>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      function ensureRepartidorFallbackNodes() {
        const kpiHost = document.getElementById("react-ui-repartidor-kpis");
        if (kpiHost && !document.getElementById("stat-listos")) {
          kpiHost.innerHTML = "" +
            "<div class='kpis'>" +
              "<article class='kpi'><p>Pedidos listos</p><h2 id='stat-listos'>0</h2></article>" +
              "<article class='kpi'><p>Pendientes confirmar</p><h2 id='stat-pendientes'>0</h2></article>" +
              "<article class='kpi'><p>CP unicos</p><h2 id='stat-cps'>0</h2></article>" +
            "</div>";
        }

        const actionHost = document.getElementById("react-ui-repartidor-actions");
        if (actionHost && !document.getElementById("btn-refresh")) {
          actionHost.innerHTML = "" +
            "<div class='soft-actions'>" +
              "<button id='btn-scan-qr' class='btn rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors duration-200' type='button'>Escanear QR</button>" +
              "<button id='btn-refresh' class='btn rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors duration-200' type='button'>Actualizar</button>" +
            "</div>";
        }

        const topActionHost = document.getElementById("react-ui-repartidor-top-actions");
        if (topActionHost && !document.getElementById("btn-logout")) {
          topActionHost.innerHTML = "" +
            "<div class='soft-actions'>" +
              "<button id='btn-logout' class='btn rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors duration-200' type='button'>Salir</button>" +
            "</div>";
        }
      }

      if (window.QCSoftUI && typeof window.QCSoftUI.mountSoftHeaderStrip === "function") {
        window.QCSoftUI.mountSoftHeaderStrip("react-ui-repartidor-strip", {
          items: [
            { tone: "indigo", text: "Repartidor" },
            { tone: "rose", text: "Confirmacion segura" },
            { tone: "amber", text: "UI React + Tailwind" }
          ]
        });

        if (typeof window.QCSoftUI.mountSoftPanelHeading === "function") {
          window.QCSoftUI.mountSoftPanelHeading("react-ui-repartidor-orders-heading", {
            title: "Pedidos asignados",
            subtitle: "Estado listo para entregar",
            icon: "package-check",
            tone: "indigo"
          });
          window.QCSoftUI.mountSoftPanelHeading("react-ui-repartidor-route-heading", {
            title: "Ruta sugerida",
            subtitle: "Orden por CP",
            icon: "route",
            tone: "amber"
          });
        }

        if (typeof window.QCSoftUI.mountSoftKpiRow === "function") {
          window.QCSoftUI.mountSoftKpiRow("react-ui-repartidor-kpis", {
            items: [
              { label: "Pedidos listos", valueId: "stat-listos", initialValue: "0" },
              { label: "Pendientes confirmar", valueId: "stat-pendientes", initialValue: "0" },
              { label: "CP unicos", valueId: "stat-cps", initialValue: "0" }
            ]
          });
        }

        if (typeof window.QCSoftUI.mountSoftActionButtons === "function") {
          window.QCSoftUI.mountSoftActionButtons("react-ui-repartidor-actions", {
            items: [
              { id: "btn-scan-qr", text: "Escanear QR", tone: "ghost" },
              { id: "btn-refresh", text: "Actualizar", tone: "ghost" }
            ]
          });

          window.QCSoftUI.mountSoftActionButtons("react-ui-repartidor-top-actions", {
            items: [
              { id: "btn-logout", text: "Salir", tone: "ghost" }
            ]
          });
        }

        if (typeof window.QCSoftUI.mountSoftEmptyState === "function") {
          window.QCSoftUI.mountSoftEmptyState("react-ui-repartidor-orders-empty", {
            text: "Cargando pedidos..."
          });
          window.QCSoftUI.mountSoftEmptyState("react-ui-repartidor-route-empty", {
            text: "La ruta aparecera cuando haya pedidos listos."
          });
        }
      }

      ensureRepartidorFallbackNodes();

      if (typeof initRepartidorPanel === "function") {
        setTimeout(initRepartidorPanel, 0);
      }
    });

    function initRepartidorPanel() {
      let allPedidos = [];
      let refreshTimer = null;
      let isLoadingPedidos = false;

      const ordersContainer = document.getElementById("orders-container");
      const routeContainer = document.getElementById("route-container");

      const msgSuccess = document.getElementById("msg-success");
      const msgError = document.getElementById("msg-error");
      const scannerPanel = document.getElementById("qr-scanner");
      const scannerContainerId = "qr-reader";

      const statListos = document.getElementById("stat-listos");
      const statPendientes = document.getElementById("stat-pendientes");
      const statCps = document.getElementById("stat-cps");
      const btnScanQr = document.getElementById("btn-scan-qr");
      const btnStopScan = document.getElementById("btn-stop-scan");

      const REFRESH_MS = 12000;
      let qrScanner = null;
      let qrScannerRunning = false;

      const UI_BTN_GHOST = "btn rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 transition-colors duration-200";
      const UI_BTN_PRIMARY = "btn primary rounded-xl bg-indigo-50 text-indigo-600 font-medium hover:bg-indigo-100 transition-colors duration-200";
      const UI_CHIP = {
        amber: "chip amber rounded-full bg-amber-50 text-amber-700 border border-amber-100",
        green: "chip green rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100"
      };
      let pendingScanPedidoId = null;
      let qrScriptLoadingPromise = null;

      function esc(value) {
        return String(value == null ? "" : value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function jsEsc(value) {
        return String(value == null ? "" : value)
          .replaceAll("\\", "\\\\")
          .replaceAll("'", "\\'")
          .replaceAll("\n", " ");
      }

      function emptyState(text) {
        return "<div class='empty rounded-2xl border border-dashed border-gray-200 bg-white/90 text-gray-500'>" + esc(text) + "</div>";
      }

      function hideMessages() {
        msgSuccess.classList.remove("show");
        msgError.classList.remove("show");
      }

      function showSuccess(message) {
        msgError.classList.remove("show");
        msgSuccess.textContent = message;
        msgSuccess.classList.add("show");
        setTimeout(() => msgSuccess.classList.remove("show"), 4200);
      }

      function showError(message) {
        msgSuccess.classList.remove("show");
        msgError.textContent = message;
        msgError.classList.add("show");
        setTimeout(() => msgError.classList.remove("show"), 4600);
      }

      function normalizePayload(payload) {
        const ok = Boolean(payload && (payload.ok === true || payload.success === true));
        const rawData = payload && (payload.data !== undefined ? payload.data : payload.pedidos);
        const data = Array.isArray(rawData) ? rawData : [];
        const error = payload && (payload.error || payload.mensaje);
        return { ok, data, error };
      }

      function toText(value, fallback) {
        return value == null || value === "" ? fallback : String(value);
      }

      function normalizePedido(p) {
        const pedidoId = p.pedido_id ?? p.id ?? p.order_id;
        const direccion = p.direccion_entrega ?? p.direccion ?? p.direccion_texto ?? "Sin direccion";
        const cliente = p.cliente_nombre ?? p.nombre_cliente ?? p.cliente ?? "Cliente";
        const cp = p.codigo_postal ?? p.cp ?? p.postal_code ?? "00000";
        const metodoPago = p.metodo_pago ?? "efectivo";

        let productos = p.productos;
        if (Array.isArray(productos)) {
          productos = productos.map((it) => {
            if (typeof it === "string") return it;
            const nombre = it.producto ?? it.nombre ?? "Producto";
            const cantidad = it.cantidad ?? 1;
            return cantidad + " x " + nombre;
          }).join("\n");
        }

        return {
          id: pedidoId,
          estado: String(p.estado || "").toLowerCase(),
          direccion: toText(direccion, "Sin direccion"),
          cliente: toText(cliente, "Cliente"),
          cp: toText(cp, "00000"),
          metodoPago: toText(metodoPago, "efectivo"),
          productos: toText(productos, "Sin detalle de productos")
        };
      }

      function pagoLabel(metodoPago) {
        const m = String(metodoPago || "").toLowerCase();
        if (m === "mercadopago") return "Tarjeta / MercadoPago";
        if (m === "contra_entrega_ficticio") return "Contra entrega (ficticio)";
        return "Efectivo";
      }

      function onlyListos(pedidos) {
        return pedidos.filter((p) => p.estado === "listo");
      }

      async function loadPedidos(force) {
        if (isLoadingPedidos && !force) return;
        isLoadingPedidos = true;
        hideMessages();
        try {
          const res = await fetch("/api/repartidor/pedidos", {
            method: "GET",
            credentials: "same-origin",
            headers: { "Accept": "application/json" }
          });

          if (res.redirected && res.url) {
            window.location.href = res.url;
            return;
          }

          const ct = (res.headers.get("content-type") || "").toLowerCase();
          if (!ct.includes("application/json")) {
            if (ct.includes("text/html")) window.location.href = "/login";
            throw new Error("Respuesta no valida");
          }

          const payload = await res.json();
          const normalized = normalizePayload(payload);

          if (!res.ok || !normalized.ok) {
            showError(normalized.error || "No se pudieron cargar los pedidos asignados.");
            allPedidos = [];
            render();
            return;
          }

          allPedidos = normalized.data.map(normalizePedido).filter((p) => p.id !== undefined && p.id !== null);
          render();
        } catch (_err) {
          allPedidos = [];
          render();
          showError("Error de conexion al cargar pedidos de repartidor.");
        } finally {
          isLoadingPedidos = false;
        }
      }

      function scheduleRefresh() {
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(async () => {
          if (!document.hidden) {
            await loadPedidos(false);
          }
          scheduleRefresh();
        }, REFRESH_MS);
      }

      function render() {
        const pedidosListos = onlyListos(allPedidos);
        renderStats(pedidosListos);
        renderPedidos(pedidosListos);
        renderRuta(pedidosListos);
      }

      function renderStats(pedidosListos) {
        const cps = new Set(pedidosListos.map((p) => p.cp));
        statListos.textContent = String(pedidosListos.length);
        statPendientes.textContent = String(pedidosListos.length);
        statCps.textContent = String(cps.size);
      }

      function renderPedidos(pedidos) {
        if (!pedidos.length) {
          ordersContainer.innerHTML = emptyState("No hay pedidos en estado listo para este repartidor.");
          return;
        }

        ordersContainer.innerHTML = pedidos.map((pedido) => {
          const inputId = "codigo-" + pedido.id;
          const boxId = "confirm-" + pedido.id;
          return (
            "<article class='order-card bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300' data-pedido-id='" + esc(pedido.id) + "'>" +
              "<div class='order-head'>" +
                "<h4 class='order-id'>Pedido #" + esc(pedido.id) + "</h4>" +
                "<span class='" + UI_CHIP.green + "'>listo</span>" +
              "</div>" +

              "<div class='grid'>" +
                "<div><span>Cliente:</span> <strong>" + esc(pedido.cliente) + "</strong></div>" +
                "<div><span>CP:</span> <strong>" + esc(pedido.cp) + "</strong></div>" +
                "<div><span>Pago:</span> <strong>" + esc(pagoLabel(pedido.metodoPago)) + "</strong></div>" +
                "<div style='grid-column:1 / -1;'><span>Direccion:</span> <strong>" + esc(pedido.direccion) + "</strong></div>" +
              "</div>" +

              "<div class='products'>" + esc(pedido.productos) + "</div>" +

              "<div class='actions'>" +
                "<button class='" + UI_BTN_PRIMARY + "' type='button' onclick='openConfirm(" + Number(pedido.id) + ")'>Confirmar entrega</button>" +
                "<button class='" + UI_BTN_GHOST + "' type='button' onclick='reenviarCodigo(" + Number(pedido.id) + ")'>Reenviar codigo</button>" +
                "<button class='" + UI_BTN_GHOST + "' type='button' data-action='maps' data-address='" + esc(pedido.direccion) + "'>Abrir Maps</button>" +
              "</div>" +

              "<div class='confirm-box' id='" + boxId + "'>" +
                "<label>Escanea el QR para validar la entrega o escribe el codigo de entrega para liberar el pedido.</label>" +
                "<input id='" + inputId + "' type='text' maxlength='12' autocomplete='off' placeholder='Codigo de entrega' />" +
                "<div id='qr-state-" + Number(pedido.id) + "' class='small-note'>Aun no hay validacion QR; tambien puedes capturar el codigo manualmente.</div>" +
                "<div class='confirm-row " + (pedido.metodoPago === "contra_entrega_ficticio" ? "two-inputs" : "") + "'>" +
                  (pedido.metodoPago === "contra_entrega_ficticio"
                    ? "<input id='pay-" + Number(pedido.id) + "' type='text' maxlength='30' autocomplete='off' placeholder='Confirmacion pago (ej. PAY-000123)' />"
                    : "") +
                  "<button class='" + UI_BTN_GHOST + "' type='button' onclick='startQrScanner(" + Number(pedido.id) + ")'>Escanear QR</button>" +
                  "<button class='" + UI_BTN_PRIMARY + "' type='button' onclick='confirmarEntrega(" + Number(pedido.id) + ")'>Liberar pedido</button>" +
                  "<button class='" + UI_BTN_GHOST + "' type='button' onclick='closeConfirm(" + Number(pedido.id) + ")'>Cancelar</button>" +
                "</div>" +
                (pedido.metodoPago === "contra_entrega_ficticio"
                  ? "<div class='small-note'>Primero confirma el pago al entregar y luego libera el pedido.</div>"
                  : "") +
              "</div>" +
            "</article>"
          );
        }).join("");
      }

      function renderRuta(pedidosListos) {
        if (!pedidosListos.length) {
          routeContainer.innerHTML = emptyState("Sin pedidos para calcular ruta.");
          return;
        }

        const ordenados = [...pedidosListos].sort((a, b) => String(a.cp).localeCompare(String(b.cp)));
        routeContainer.innerHTML = ordenados.map((pedido, idx) => (
          "<article class='route-card bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300'>" +
            "<div class='route-order'>" + (idx + 1) + "</div>" +
            "<div class='route-main'><strong>Pedido #" + esc(pedido.id) + "</strong><br>" + esc(pedido.cliente) + "<br>" + esc(pedido.direccion) + "<br><span class='" + UI_CHIP.amber + "'>CP " + esc(pedido.cp) + "</span></div>" +
            "<button class='" + UI_BTN_GHOST + "' type='button' data-action='maps' data-address='" + esc(pedido.direccion) + "'>Maps</button>" +
          "</article>"
        )).join("");
      }

      function setQrState(pedidoId, message) {
        const statusNode = document.getElementById("qr-state-" + pedidoId);
        if (statusNode) {
          statusNode.textContent = message;
        }
      }

      function setScannedCode(pedidoId, codigo) {
        const input = document.getElementById("codigo-" + pedidoId);
        if (input) {
          input.value = String(codigo || "").trim().toUpperCase();
        }
      }

      async function ensureQrLibraryReady() {
        if (typeof Html5Qrcode !== "undefined") {
          return true;
        }
        if (!qrScriptLoadingPromise) {
          qrScriptLoadingPromise = new Promise((resolve, reject) => {
            const existing = document.getElementById("html5-qrcode-fallback");
            if (existing) {
              existing.addEventListener("load", () => resolve(true), { once: true });
              existing.addEventListener("error", () => reject(new Error("load_error")), { once: true });
              return;
            }
            const script = document.createElement("script");
            script.id = "html5-qrcode-fallback";
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js";
            script.async = true;
            script.onload = () => resolve(true);
            script.onerror = () => reject(new Error("load_error"));
            document.head.appendChild(script);
          }).catch(() => false);
        }
        return Boolean(await qrScriptLoadingPromise);
      }

      async function fetchCodigoEntregaForPedido(pedidoId) {
        const res = await fetch("/api/pedidos/" + pedidoId + "/codigo-entrega", {
          method: "GET",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });
        const payload = await res.json().catch(() => ({}));
        const ok = Boolean(payload && (payload.ok === true || payload.success === true));
        if (!res.ok || !ok) {
          throw new Error((payload && (payload.error || payload.mensaje)) || "No se pudo obtener el codigo de entrega.");
        }
        const data = payload && payload.data ? payload.data : {};
        return data && data.codigo_entrega ? String(data.codigo_entrega).trim().toUpperCase() : "";
      }

      function openConfirm(pedidoId) {
        document.querySelectorAll(".confirm-box.active").forEach((el) => el.classList.remove("active"));
        const box = document.getElementById("confirm-" + pedidoId);
        if (box) box.classList.add("active");
        const input = document.getElementById("codigo-" + pedidoId);
        if (input && !input.value) {
          input.focus();
        }
        setQrState(pedidoId, "Escanea el QR o captura el codigo de entrega.");
      }

      function closeConfirm(pedidoId) {
        const box = document.getElementById("confirm-" + pedidoId);
        if (box) box.classList.remove("active");
      }

      async function confirmarEntrega(pedidoId) {
        hideMessages();
        const input = document.getElementById("codigo-" + pedidoId);
        const codigo = input && input.value ? input.value.trim() : "";
        const pedido = allPedidos.find((p) => Number(p.id) === Number(pedidoId));
        const metodoPago = pedido ? String(pedido.metodoPago || "").toLowerCase() : "efectivo";
        const pagoInput = document.getElementById("pay-" + pedidoId);
        const numeroConfirmacionPago = pagoInput && pagoInput.value ? pagoInput.value.trim().toUpperCase() : "";
        if (!codigo) {
          showError("Escanea el QR o escribe el codigo de entrega que recibio el cliente para liberar el pedido.");
          return;
        }
        if (metodoPago === "contra_entrega_ficticio" && !numeroConfirmacionPago) {
          showError("Debes capturar el numero de confirmacion de pago para liberar este pedido.");
          return;
        }

        try {
          const confirmRes = await fetch("/api/pedidos/" + pedidoId + "/confirmar", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              codigo_entrega: codigo,
              numero_confirmacion_pago: numeroConfirmacionPago || null
            })
          });

          if (confirmRes.redirected && confirmRes.url) {
            window.location.href = confirmRes.url;
            return;
          }

          const confirmPayload = await confirmRes.json().catch(() => ({}));
          const confirmOk = Boolean(confirmPayload && (confirmPayload.ok === true || confirmPayload.success === true));

          if (!confirmRes.ok || !confirmOk) {
            const msg = (confirmPayload && (confirmPayload.error || confirmPayload.mensaje)) || "Codigo incorrecto. No se pudo confirmar la entrega.";
            showError(msg);
            return;
          }

          const data = confirmPayload && confirmPayload.data ? confirmPayload.data : {};
          if (data && data.confirmacion_pago) {
            showSuccess("Pago confirmado (" + data.confirmacion_pago + ") y entrega liberada correctamente.");
          } else {
            showSuccess("Entrega confirmada correctamente. Pedido marcado como entregado.");
          }

          try {
            await fetch("/api/evaluaciones/programar", {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ pedido_id: pedidoId, retraso_minutos: 15 })
            });
          } catch (_e) {
          }

          closeConfirm(pedidoId);
          await loadPedidos(true);
        } catch (_err) {
          showError("No fue posible confirmar la entrega en este momento.");
        }
      }

      async function reenviarCodigo(pedidoId) {
        hideMessages();
        try {
          const res = await fetch("/api/pedidos/" + pedidoId + "/reenviar-codigo", {
            method: "POST",
            credentials: "same-origin",
            headers: { "Content-Type": "application/json" }
          });

          if (res.redirected && res.url) {
            window.location.href = res.url;
            return;
          }

          const payload = await res.json().catch(() => ({}));
          const ok = Boolean(payload && (payload.ok === true || payload.success === true));

          if (!res.ok || !ok) {
            const msg = (payload && (payload.error || payload.mensaje)) || "No se pudo reenviar el codigo al cliente.";
            showError(msg);
            return;
          }

          const data = payload && payload.data ? payload.data : {};
          const codigo = data && data.codigo_entrega ? String(data.codigo_entrega).trim().toUpperCase() : "";
          if (codigo) {
            setScannedCode(pedidoId, codigo);
            openConfirm(pedidoId);
            setQrState(pedidoId, "Codigo cargado correctamente. Ya puedes liberar el pedido o escanear el QR.");
            showSuccess("Codigo reenviado al cliente y listo para liberar: " + codigo);
          } else {
            showSuccess("Codigo reenviado al cliente por WhatsApp.");
          }
        } catch (_err) {
          showError("Error de red al reenviar el codigo.");
        }
      }

      function openMaps(direccion) {
        const q = encodeURIComponent(direccion || "");
        const mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + q;
        const popup = window.open(mapsUrl, "_blank", "noopener");
        if (!popup) {
          window.location.href = mapsUrl;
        }
      }

      function parseQrPayload(rawText) {
        // Formato pipe: QC|pedido:23|codigo:GK24D8
        if (rawText && rawText.startsWith("QC|")) {
          try {
            const parts = rawText.split("|");
            let pedidoId = null, codigoEntrega = "";
            for (const part of parts) {
              const [key, val] = part.split(":");
              if (key === "pedido") pedidoId = Number(val);
              if (key === "codigo") codigoEntrega = String(val || "").trim().toUpperCase();
            }
            if (pedidoId && Number.isFinite(pedidoId)) {
              return { pedidoId, codigoEntrega };
            }
          } catch (_err) {
            return null;
          }
        }
        // Formato JSON legacy
        try {
          let parsed = JSON.parse(rawText);
          if (typeof parsed === "string") {
            parsed = JSON.parse(parsed);
          }

          if (!parsed || typeof parsed !== "object") {
            return null;
          }

          const idValue = parsed.pedido_id ?? parsed.pedido ?? parsed.id;
          const pedidoId = Number(idValue);
          if (!Number.isFinite(pedidoId)) {
            return null;
          }

          const codigoEntrega = String(parsed.codigo_entrega ?? parsed.codigo ?? "").trim().toUpperCase();
          return { pedidoId, codigoEntrega };
        } catch (_err) {
          return null;
        }
      }

      async function openConfirmFromQrText(rawText) {
        const qrData = parseQrPayload(rawText);
        if (!qrData) {
          showError("QR invalido o no compatible con el formato de cocina.");
          return;
        }

        if (pendingScanPedidoId && Number(qrData.pedidoId) !== Number(pendingScanPedidoId)) {
          showError("El QR escaneado no corresponde al pedido que intentas liberar.");
          return;
        }

        const target = allPedidos.find((p) => Number(p.id) === Number(qrData.pedidoId));
        if (!target) {
          showError("El QR corresponde a un pedido que no esta en tu lista actual.");
          return;
        }

        let codigo = qrData.codigoEntrega;
        if (!codigo) {
          try {
            codigo = await fetchCodigoEntregaForPedido(target.id);
          } catch (err) {
            showError(err && err.message ? err.message : "No se pudo validar el codigo del pedido escaneado.");
            return;
          }
        }

        if (!codigo) {
          showError("No se encontro codigo de entrega para este pedido.");
          return;
        }

        setScannedCode(target.id, codigo);
        openConfirm(target.id);
        setQrState(target.id, "QR validado correctamente para el pedido #" + target.id + ".");
        pendingScanPedidoId = null;
        showSuccess("Pedido #" + target.id + " detectado y validado por QR.");
      }

      async function stopQrScanner() {
        pendingScanPedidoId = null;
        if (!qrScanner || !qrScannerRunning) {
          if (scannerPanel) scannerPanel.classList.remove("active");
          return;
        }
        try {
          await qrScanner.stop();
        } catch (_err) {
        }
        try {
          await qrScanner.clear();
        } catch (_err) {
        }
        qrScannerRunning = false;
        if (scannerPanel) scannerPanel.classList.remove("active");
      }

      async function startQrScanner(targetPedidoId) {
        hideMessages();
        if (targetPedidoId != null) {
          pendingScanPedidoId = Number(targetPedidoId);
          openConfirm(targetPedidoId);
        }

        const libraryReady = await ensureQrLibraryReady();
        if (!libraryReady || typeof Html5Qrcode === "undefined") {
          showError("El escaner QR no esta disponible en este navegador en este momento.");
          return;
        }

        if (!qrScanner) {
          qrScanner = new Html5Qrcode(scannerContainerId);
        }

        if (qrScannerRunning) {
          return;
        }

        if (scannerPanel) scannerPanel.classList.add("active");
        try {
          let cameraConfig = { facingMode: "environment" };
          if (typeof Html5Qrcode.getCameras === "function") {
            const cameras = await Html5Qrcode.getCameras().catch(() => []);
            if (Array.isArray(cameras) && cameras.length) {
              const preferred = cameras.find((cam) => /back|rear|environment|trasera/i.test(String(cam.label || ""))) || cameras[0];
              cameraConfig = { deviceId: { exact: preferred.id } };
            }
          }

          await qrScanner.start(
            cameraConfig,
            { fps: 10, qrbox: { width: 240, height: 240 } },
            async (decodedText) => {
              await stopQrScanner();
              await openConfirmFromQrText(decodedText);
            },
            () => {}
          );
          qrScannerRunning = true;
        } catch (err) {
          if (scannerPanel) scannerPanel.classList.remove("active");
          let msg;
          if (err && err.name === "NotAllowedError") {
            msg = "Permiso de camara denegado. Habilitalo en la configuracion del navegador para usar el escaner QR.";
          } else if (err && err.name === "NotFoundError") {
            msg = "No se detecto una camara disponible para escanear.";
          } else if (window.location.protocol !== "https:" && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
            msg = "La camara requiere HTTPS. Para usar el escaner, accede al sistema via HTTPS o desde localhost. Alternativa: usa el boton 'Reenviar codigo' para que el cliente te diga su codigo y escríbelo manualmente.";
          } else {
            msg = "No se pudo iniciar la camara. Usa el campo de codigo manual o el boton 'Reenviar codigo' para validar la entrega.";
          }
          showError(msg);
        }
      }

      window.openConfirm = openConfirm;
      window.closeConfirm = closeConfirm;
      window.confirmarEntrega = confirmarEntrega;
      window.reenviarCodigo = reenviarCodigo;
      window.openMaps = openMaps;
      window.startQrScanner = startQrScanner;
      window.stopQrScanner = stopQrScanner;

      if (btnScanQr) {
        btnScanQr.addEventListener("click", () => {
          startQrScanner();
        });
      }

      if (btnStopScan) {
        btnStopScan.addEventListener("click", () => {
          stopQrScanner();
        });
      }

      ordersContainer.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const mapsBtn = target.closest("[data-action='maps']");
        if (!mapsBtn) return;
        const direccion = mapsBtn.getAttribute("data-address") || "";
        openMaps(direccion);
      });

      routeContainer.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const mapsBtn = target.closest("[data-action='maps']");
        if (!mapsBtn) return;
        const direccion = mapsBtn.getAttribute("data-address") || "";
        openMaps(direccion);
      });

      const btnRefresh = document.getElementById("btn-refresh");
      if (btnRefresh) {
        btnRefresh.addEventListener("click", () => {
          loadPedidos(true);
        });
      }

      if (!window.__qcRepartidorLogoutBound) {
        document.addEventListener("click", async (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          const logoutBtn = target.closest("#btn-logout");
          if (!logoutBtn) return;
          if (logoutBtn.dataset.busy === "1") return;

          logoutBtn.dataset.busy = "1";
          logoutBtn.setAttribute("disabled", "disabled");
          logoutBtn.textContent = "Saliendo...";
          try {
            await fetch("/logout", {
              method: "POST",
              credentials: "same-origin",
              headers: { "Accept": "application/json" }
            });
          } catch (_e) {
          } finally {
            window.location.href = "/login";
          }
        });
        window.__qcRepartidorLogoutBound = true;
      }

      loadPedidos(true).catch(() => {});
      scheduleRefresh();

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          loadPedidos(true).catch(() => {});
        }
      });

      window.addEventListener("beforeunload", () => {
        if (refreshTimer) clearTimeout(refreshTimer);
        if (qrScannerRunning) {
          stopQrScanner();
        }
      });
    }
  </script>
</body>
